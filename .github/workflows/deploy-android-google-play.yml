name: Deploy Android - Google Play

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      google_play_track:
        description: Google Play track override
        required: false
        default: internal
      google_play_status:
        description: Google Play status override
        required: false
        default: completed

permissions:
  contents: write

concurrency:
  group: deploy-android-google-play
  cancel-in-progress: false

jobs:
  deploy-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      JAVA_VERSION: "21"
      NODE_VERSION: "22"
      PLAY_PACKAGE_NAME: io.modoplay.app
      ANDROID_KEYSTORE_PATH: app/release.keystore
      GOOGLE_PLAY_TRACK: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.google_play_track || vars.GOOGLE_PLAY_TRACK || 'internal' }}
      GOOGLE_PLAY_STATUS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.google_play_status || vars.GOOGLE_PLAY_STATUS || 'completed' }}
      RELEASE_NOTES_DIR: distribution/whatsnew

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Validate required secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          for secret_name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD \
            PLAY_SERVICE_ACCOUNT_JSON
          do
            if [ -z "${!secret_name}" ]; then
              echo "Falta configurar el secret ${secret_name}"
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Compute Android release metadata
        id: release_meta
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: node scripts/release/compute-android-release.mjs

      - name: Apply computed Android release metadata
        run: |
          echo "ANDROID_VERSION_NAME=${{ steps.release_meta.outputs.version_name }}" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_CODE=${{ steps.release_meta.outputs.version_code }}" >> "$GITHUB_ENV"

      - name: Stop when release already exists on target track
        if: ${{ steps.release_meta.outputs.skip_publish == 'true' }}
        run: |
          echo "La release ${{ steps.release_meta.outputs.release_name }} ya existe en Google Play track $GOOGLE_PLAY_TRACK."
          echo "skip_publish=true" >> "$GITHUB_ENV"

      - name: Build Angular app
        if: ${{ env.skip_publish != 'true' }}
        run: npm run build -- --configuration production --no-progress

      - name: Sync web assets and Android plugins
        if: ${{ env.skip_publish != 'true' }}
        run: npx cap sync android

      - name: Restore Android signing keystore
        if: ${{ env.skip_publish != 'true' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "android/$ANDROID_KEYSTORE_PATH"

      - name: Generate release notes
        if: ${{ env.skip_publish != 'true' }}
        env:
          RELEASE_VERSION_NAME: ${{ env.ANDROID_VERSION_NAME }}
          RELEASE_REF: ${{ steps.release_meta.outputs.release_ref }}
        run: node scripts/release/generate-play-release-notes.mjs

      - name: Build signed Android App Bundle
        if: ${{ env.skip_publish != 'true' }}
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload AAB artifact
        if: ${{ env.skip_publish != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: modo-playa-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload to Google Play
        if: ${{ env.skip_publish != 'true' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PLAY_PACKAGE_NAME }}
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ env.GOOGLE_PLAY_TRACK }}
          status: ${{ env.GOOGLE_PLAY_STATUS }}
          releaseName: ${{ steps.release_meta.outputs.release_name }}
          whatsNewDirectory: ${{ env.RELEASE_NOTES_DIR }}

      - name: Create or update GitHub release for tags
        if: ${{ env.skip_publish != 'true' && startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 && \
            gh release edit "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file "$RELEASE_NOTES_DIR/whatsnew-en-US" || \
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file "$RELEASE_NOTES_DIR/whatsnew-en-US"
