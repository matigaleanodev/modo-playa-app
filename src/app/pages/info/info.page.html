<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Info</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <section class="page">
    <p>Pantalla informativa placeholder.</p>
    <ion-list>
      <ion-item button routerLink="/terms">
        <ion-label>Terminos y condiciones</ion-label>
      </ion-item>
      <ion-item button routerLink="/privacy">
        <ion-label>Politica de privacidad</ion-label>
      </ion-item>
    </ion-list>
  </section>
</ion-content>
