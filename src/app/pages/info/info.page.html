<ion-header class="app-page-header">
  <ion-toolbar class="app-page-toolbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" />
    </ion-buttons>
    <ion-title>Modo Playa</ion-title>
    <ion-buttons slot="end">
      <ion-menu-button menu="main-menu"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="info-hero">
    <div class="info-hero-inner">
      <h1>{{ appName }}</h1>
      <p>Catalogo publico de Modo Playa</p>
    </div>
  </div>

  <div class="info-wrapper">
    <ion-list inset>
      <ion-list-header>
        <ion-label>Informacion</ion-label>
      </ion-list-header>

      <ion-item button detail routerLink="/terms">
        <ion-icon name="document-text-outline" slot="start"></ion-icon>
        <ion-label>Terminos y condiciones</ion-label>
      </ion-item>

      <ion-item button detail routerLink="/privacy">
        <ion-icon name="shield-checkmark-outline" slot="start"></ion-icon>
        <ion-label>Politica de privacidad</ion-label>
      </ion-item>

      <ion-item button detail [href]="helpUrl" target="_blank">
        <ion-icon name="help-circle-outline" slot="start"></ion-icon>
        <ion-label>Ayuda / Issues</ion-label>
      </ion-item>
    </ion-list>

    <ion-list inset>
      <ion-list-header>
        <ion-label>Contacto</ion-label>
      </ion-list-header>

      <ion-item button detail [href]="'mailto:' + contactEmail">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-label>
          <p>Email</p>
          <h3>{{ contactEmail }}</h3>
        </ion-label>
      </ion-item>

      <ion-item button detail [href]="githubUrl" target="_blank">
        <ion-icon name="logo-github" slot="start"></ion-icon>
        <ion-label>Repositorio del proyecto</ion-label>
      </ion-item>
    </ion-list>

    <ion-list inset>
      <ion-list-header>
        <ion-label>Aplicacion</ion-label>
      </ion-list-header>

      <ion-item>
        <ion-icon name="information-circle-outline" slot="start"></ion-icon>
        <ion-label>
          <p>Version</p>
          <h3>{{ appVersion }}</h3>
        </ion-label>
      </ion-item>

      <ion-item>
        <ion-icon name="information-circle-outline" slot="start"></ion-icon>
        <ion-label>
          <p>Entorno</p>
          <h3>{{ appStage }}</h3>
        </ion-label>
      </ion-item>
    </ion-list>
  </div>
</ion-content>

<ion-footer class="app-page-footer">
  <ion-toolbar class="app-page-toolbar">
    <div class="app-page-footer-note">Modo Playa App</div>
  </ion-toolbar>
</ion-footer>
