<ion-card class="lodging-card" [button]="true" (click)="toLodgingDetail($event)">
  <div class="lodging-card-image-wrap">
    <ion-img
      class="lodging-card-image"
      [src]="imageUrl()"
      [alt]="lodging().title"
      (ionError)="onImageError($event)"
    ></ion-img>
  </div>

  <ion-card-content class="lodging-card-content">
    <h3 class="lodging-card-title">{{ lodging().title }}</h3>

    <p class="lodging-card-location">
      <ion-icon name="location-outline" aria-hidden="true"></ion-icon>
      <span>{{ locationLabel() }}</span>
    </p>

    <p class="lodging-card-description">{{ lodging().description }}</p>

    <div class="lodging-card-footer">
      <p class="lodging-card-price">
        <span class="lodging-card-price-value">
          {{ lodging().price | currency: 'ARS':'symbol':'1.0-0' }}
        </span>
        <span class="lodging-card-price-unit">/ {{ priceUnitLabel() }}</span>
      </p>

      <ion-button
        class="favorite-button"
        [class.is-favorite]="isFavorite()"
        fill="clear"
        aria-label="Agregar o quitar de favoritos"
        (click)="toggleFavorite($event)"
      >
        <ion-icon slot="icon-only" name="heart" aria-hidden="true"></ion-icon>
      </ion-button>
    </div>
  </ion-card-content>
</ion-card>
