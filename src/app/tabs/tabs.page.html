<ion-tabs>
  <ion-tab-bar slot="bottom">
    @for (tab of tabItems; track tab.id) {
      <ion-tab-button [tab]="tab.path" [routerLink]="tab.path">
        <ion-icon aria-hidden="true" [name]="tab.icon"></ion-icon>
        <ion-label>{{ tab.label }}</ion-label>
      </ion-tab-button>
    }
  </ion-tab-bar>
</ion-tabs>
